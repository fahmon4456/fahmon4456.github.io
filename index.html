<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Student Points</title>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbziHTPIKYehe8NEZStkfbh6uWL16TNxnQ9aaa0tXqFM6bpq6hcSupBUg1mIM1EYpnUK/exec";

    // LOAD DATA
    document.addEventListener("DOMContentLoaded", () => {
      fetch(API_URL)
        .then(res => res.json())
        .then(data => {
          const rows = data.slice(1); // skip header

          const container = document.getElementById("students");
          container.innerHTML = "";

          rows.forEach(row => {
            const div = document.createElement("div");

            div.textContent = `${row[0]} - ${row[1]}`;

            div.style.padding = "10px";
            div.style.margin = "5px";
            div.style.background = "#eee";
            div.style.borderRadius = "8px";

            container.appendChild(div);
          });
        });
    });

    // SEND DATA
   function sendData() {
  const name = document.getElementById("name").value;
  const points = document.getElementById("points").value;

  fetch(`${API_URL}?name=${name}&points=${points}`)
    .then(res => res.text())
    .then(data => {
      console.log("OK:", data);
    });
}
  </script>
</head>

<body>

  <h1>Student Points</h1>

  <input id="name" placeholder="Student name">
  <input id="points" type="number" placeholder="Points">

  <button onclick="sendData()">Send</button>

  <div id="status"></div>

  <h2>Students</h2>
  <div id="students"></div>

</body>
</html>
